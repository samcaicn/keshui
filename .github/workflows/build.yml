name: Build SDK and App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-sdk:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew

    - name: Clean build cache
      run: ./gradlew clean

    - name: Build SDK
      run: ./gradlew :sdk:assembleRelease --stacktrace --info

    - name: Upload SDK AAR
      uses: actions/upload-artifact@v5
      with:
        name: drowze-sdk
        path: sdk/build/outputs/aar/sdk-release.aar

  build-app:
    runs-on: ubuntu-latest
    needs: build-sdk

    steps:
    - uses: actions/checkout@v5

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew

    - name: Build App
      run: ./gradlew :app:assembleDebug

    - name: Upload App APK
      uses: actions/upload-artifact@v5
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk

  lint:
    runs-on: ubuntu-latest
    needs: build-sdk

    steps:
    - uses: actions/checkout@v5

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew

    - name: Run Lint
      run: ./gradlew lint