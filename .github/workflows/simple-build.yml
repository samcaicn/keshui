name: Simple Build SDK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew

    - name: Build SDK
      run: ./gradlew :sdk:assembleDebug

    - name: Upload SDK AAR
      uses: actions/upload-artifact@v5
      with:
        name: drowze-sdk
        path: sdk/build/outputs/aar/sdk-debug.aar